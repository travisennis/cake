[[repos]]
repo = "local"
hooks = [
  {
    id = "fmt",
    name = "cargo fmt",
    language = "system",
    entry = "cargo fmt -- --check",
    files = "\\.rs$",
    pass_filenames = false,
  },
  {
    id = "clippy",
    name = "cargo clippy",
    language = "system",
    entry = "cargo clippy --all-targets --all-features -- -D warnings",
    files = "\\.rs$",
    pass_filenames = false,
  },
  {
    id = "docs-check",
    name = "panache docs check",
    language = "system",
    entry = "panache lint --force-exclude .",
    files = "\\.md$",
    pass_filenames = false,
  },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "pre-push-ci",
    name = "just pre-push",
    language = "system",
    entry = "just pre-push",
    stages = ["pre-push"],
    pass_filenames = false,
  },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "conventional-commit-check",
    name = "Conventional Commit Check",
    language = "system",
    entry = "cog verify --file",
    stages = ["commit-msg"],
  },
]
