# Primary CI workflow.
#
# macOS is the primary development and validation platform for cake. Linux is
# currently an aspirational compatibility target, so CI keeps Linux blocking at
# compile level only and runs full correctness checks on macOS.

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  COVERAGE_THRESHOLD: 90

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.filter.outputs.coverage }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED="$(git diff --name-only "$BASE...$HEAD")"
          else
            CHANGED="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1 HEAD)"
          fi

          if printf '%s\n' "$CHANGED" | grep -Eq '^(src/|tests/|Cargo\.toml|Cargo\.lock|rust-toolchain\.toml|\.cargo/|\.github/workflows/ci\.yml|justfile|ci/)'; then
            echo "coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "coverage=false" >> "$GITHUB_OUTPUT"
          fi

  linux-check:
    name: Linux Check
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  fmt:
    name: Format
    needs: linux-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy (${{ matrix.features.name }})
    needs: linux-check
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - name: all-features
            args: --all-features
          - name: no-default-features
            args: --no-default-features
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets ${{ matrix.features.args }} --message-format=short -- -D warnings

  test:
    name: Test
    needs: linux-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --quiet

  docs:
    name: Docs
    needs: linux-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: panache
      - run: panache format --check . --quiet
      - run: panache lint . --quiet || true

  coverage:
    name: Coverage
    needs: [changes, linux-check]
    if: github.event_name == 'push' || needs.changes.outputs.coverage == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo install cargo-crap --version 0.2.2 --locked

      - name: Check coverage and change-risk regression
        run: scripts/check-coverage.sh --cargo-crap-format github

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
